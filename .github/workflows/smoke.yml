name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install -r skills/arena/scripts/requirements.txt

      - name: arena --help (sanity)
        run: |
          python3 skills/arena/scripts/arena.py --help
          python3 skills/arena/scripts/arena.py channel --help
          python3 skills/arena/scripts/arena.py block --help
          python3 skills/arena/scripts/arena.py user --help

      - name: arena doctor (live)
        if: ${{ env.ARENA_API_KEY != '' }}
        env:
          ARENA_API_KEY: ${{ secrets.ARENA_API_KEY }}
        run: |
          python3 skills/arena/scripts/arena.py doctor

      - name: arena user me (live)
        if: ${{ env.ARENA_API_KEY != '' }}
        env:
          ARENA_API_KEY: ${{ secrets.ARENA_API_KEY }}
        run: |
          python3 skills/arena/scripts/arena.py user me --pretty

      - name: arena channel info (live, public channel)
        if: ${{ env.ARENA_API_KEY != '' }}
        env:
          ARENA_API_KEY: ${{ secrets.ARENA_API_KEY }}
        run: |
          # Use a known-public Are.na channel for the smoke check.
          python3 skills/arena/scripts/arena.py channel info schizocollage --pretty
